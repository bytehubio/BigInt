# .github/workflows/sync-upstream-tags.yml
name: Sync upstream tags

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync-tags:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync tags from upstream
        run: |
          git remote add upstream https://github.com/attaswift/BigInt.git
          git fetch upstream --tags
          git push origin --tags
